name: Trail Condition Classification

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:
    inputs:
      mode:
        description: "Classification mode"
        required: false
        default: "incremental"
        type: choice
        options:
          - incremental
          - full

jobs:
  classify:
    runs-on: ubuntu-latest
    timeout-minutes: 350

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Write GCP credentials
        shell: bash
        run: |
          printf '%s' '${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}' > "$RUNNER_TEMP/gcp-key.json"
          echo "GOOGLE_APPLICATION_CREDENTIALS=$RUNNER_TEMP/gcp-key.json" >> $GITHUB_ENV

      - name: Run classification (incremental)
        if: ${{ github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && inputs.mode == 'incremental') }}
        env:
          NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
        run: python -m classification.run_classification incremental

      - name: Run classification (full)
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.mode == 'full' }}
        env:
          NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
        run: python -m classification.run_classification full
